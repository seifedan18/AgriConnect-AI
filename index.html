<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriConnect AI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>AgriConnect AI</h1>
    <p>Your AI assistant for smarter farming</p>
  </header>

  <main>
    <section class="input-section">
      <h2>Farm Details</h2>
      <form id="farmForm">
        <label for="soil">Soil Type:</label>
        <select id="soil" required>
          <option value="">Select Soil</option>
          <option value="loamy">Loamy</option>
          <option value="clay">Clay</option>
          <option value="sandy">Sandy</option>
        </select>

        <label for="rainfall">Average Rainfall (mm/year):</label>
        <input type="number" id="rainfall" placeholder="e.g., 800" required>

        <label for="temperature">Average Temperature (°C):</label>
        <input type="number" id="temperature" placeholder="e.g., 25" required>

        <button type="submit">Get AI Recommendation</button>
      </form>
    </section>

    <section class="result-section">
      <h2>AI Recommendation</h2>
      <div id="recommendation">Your recommended crops will appear here.</div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 AgriConnect AI</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
